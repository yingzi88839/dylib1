name: Build iOS dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build dylib
        run: |
          echo "Building iOS dylib..."
          clang++ -dynamiclib -std=c++11 -arch arm64 -o MapHack.dylib main.mm -framework Foundation -framework UIKit -Wl,-install_name,@rpath/MapHack.dylib
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapHack.dylib
          path: MapHack.dylib
