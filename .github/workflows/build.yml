name: Build iOS dylib

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build the dylib
      run: |
        xcodebuild -project YourProjectName.xcodeproj -scheme YourSchemeName -configuration Release build
        # 或者如果是用 Swift 包管理的
        # swift build -c release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyDylib
        path: ./build/Release/*.dylib
