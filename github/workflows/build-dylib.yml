  - name: Make build script executable
    run: |
      cd JunshiCheat
      chmod +x build.sh || true

  - name: Build (run build.sh)
    run: |
      set -e
      cd JunshiCheat
      ./build.sh

  - name: Show build output files
    run: |
      cd JunshiCheat
      echo "Listing files:"
      find . -maxdepth 2 -type f -name "*.dylib" -o -name "*.so" -o -name "*.a" -print || true

  - name: Upload dylib artifact
    uses: actions/upload-artifact@v4
    with:
      name: JunshiCheat-dylibs
      path: JunshiCheat/**/*.dylib